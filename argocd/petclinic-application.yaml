apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: petclinic=YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/devsecops-petclinic
    argocd-image-updater.argoproj.io/petclinic.update-strategy: newest-build
    argocd-image-updater.argoproj.io/petclinic.allow-tags: regexp:^.*$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/devsecops-petclinic-manifests.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true